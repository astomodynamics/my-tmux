# Enable mouse support (scroll, select panes/windows, resize)
set -g mouse on

# Use vi keys in copy mode for easier selection
set -g mode-keys vi

# Clipboard integration (Wayland)
set -g set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Switch panes with Alt+arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows with Shift+arrow (no prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# Lazygit popup (prefix + g)
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 15 minutes, auto-restore on tmux start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
