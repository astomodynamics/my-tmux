# Enable mouse support (scroll, select panes/windows, resize)
set -g mouse on
set -g focus-events on
set -g history-limit 50000
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Use vi keys in copy mode for easier selection
set -g mode-keys vi

# Clipboard integration (Wayland)
set -g set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Switch panes with Alt+arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows with Shift+arrow (no prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# Split panes in the current pane's working directory
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'

# Lazygit popup (prefix + g)
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Yazi popup (prefix + f)
bind f display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "bash -lc 'if command -v yazi >/dev/null 2>&1; then yazi; else echo \"yazi is not installed. Install it and reopen this popup.\"; read -r -n 1 -s; fi'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'fcsonline/tmux-thumbs'

# Plugin cheat sheet:
# - tmux-yank: prefix + y copies the current command line, prefix + Y copies the pane's working directory, and y in copy mode copies to the system clipboard.
# - tmux-logging: prefix + P toggles logging, prefix + M-p saves visible pane text, prefix + M-P saves full pane history, prefix + M-c clears pane history.
# - tmux-thumbs: prefix + Space highlights paths, SHAs, URLs, and other tokens for quick copy/paste via hint selection.

# Auto-save every 15 minutes, auto-restore on tmux start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
